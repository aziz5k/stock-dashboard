<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتجات والمخزون - مارس 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e1a; --surface: #111827; --accent: #00d4ff; --accent3: #00ff9d; 
  --text: #e2e8f0; --text-muted: #6b7fa3; --red: #ff4757; --orange: #ff6b35; --yellow: #ffd700;
}
body {
  font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text);
  margin: 0; padding: 24px; direction: rtl; min-height: 100vh;
}
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 40px; }
.header h1 { color: var(--accent); font-size: 32px; margin-bottom: 10px; }
.header p { color: var(--text-muted); font-size: 16px; }

/* Navigation */
.nav-bar {
  background: var(--surface); border-radius: 12px; padding: 16px; margin-bottom: 30px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
}
.back-btn {
  background: var(--accent); color: var(--bg); text-decoration: none;
  padding: 10px 20px; border-radius: 8px; font-weight: 600;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
}
.back-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,212,255,0.3); }

/* Filters */
.filters {
  background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 30px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;
}
.filter-group { display: flex; flex-direction: column; }
.filter-group label { color: var(--text-muted); font-size: 12px; margin-bottom: 5px; }
.filter-input, .filter-select {
  background: var(--bg); border: 1px solid #333; color: var(--text); 
  padding: 10px 12px; border-radius: 6px; font-family: inherit;
}
.filter-input:focus, .filter-select:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,255,0.2);
}

/* Stats Cards */
.stats-grid { 
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
  gap: 20px; margin-bottom: 30px; 
}
.stat-card {
  background: var(--surface); padding: 20px; border-radius: 12px; text-align: center;
  border: 1px solid #333;
}
.stat-value { font-size: 24px; font-weight: bold; margin: 10px 0; }
.stat-label { color: var(--text-muted); font-size: 12px; }

/* Products Grid */
.products-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
  gap: 20px; margin-bottom: 30px;
}
.product-card {
  background: var(--surface); border-radius: 12px; padding: 20px;
  border: 1px solid #333; transition: all 0.3s;
}
.product-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.product-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
.product-code { font-size: 14px; color: var(--accent); font-weight: 600; }
.status-badge {
  padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase;
}
.status-active { background: rgba(0,255,157,0.2); color: var(--accent3); }
.status-low { background: rgba(255,215,0,0.2); color: var(--yellow); }
.status-critical { background: rgba(255,107,53,0.2); color: var(--orange); }
.status-damaged { background: rgba(255,71,87,0.2); color: var(--red); }

.product-name { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
.product-category { color: var(--text-muted); font-size: 12px; margin-bottom: 15px; }

.stock-info {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
}
.stock-item { text-align: center; }
.stock-value { font-size: 16px; font-weight: 600; }
.stock-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.warehouse-list {
  border-top: 1px solid #333; padding-top: 15px;
}
.warehouse-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; font-size: 13px;
}
.warehouse-name { color: var(--text-muted); }
.warehouse-stock { font-weight: 600; }

/* Charts */
.charts-section {
  display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px;
}
.chart-card {
  background: var(--surface); padding: 25px; border-radius: 12px;
  border: 1px solid #333; height: 350px;
}
.chart-title { color: var(--accent); font-size: 18px; font-weight: 600; margin-bottom: 20px; text-align: center; }

/* Pagination */
.pagination {
  display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 30px;
}
.pagination button {
  background: var(--surface); color: var(--text); border: 1px solid #333;
  padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.pagination button:hover { background: var(--accent); color: var(--bg); }
.pagination button.active { background: var(--accent); color: var(--bg); }
.pagination button:disabled { opacity: 0.5; cursor: not-allowed; }

@media (max-width: 768px) {
  .filters { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .products-grid { grid-template-columns: 1fr; }
  .charts-section { grid-template-columns: 1fr; }
  .nav-bar { flex-direction: column; gap: 15px; }
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>📋 تفاصيل المنتجات والمخزون</h1>
    <p>جميع الإحصائيات مع التفاصيل الكاملة - مارس 2026</p>
  </div>

  <!-- Navigation -->
  <div class="nav-bar">
    <a href="index.html" class="back-btn">← العودة للداشبورد الرئيسي</a>
    <span id="resultsCount" style="color: var(--text-muted);">عرض جميع المنتجات</span>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>البحث في المنتجات</label>
      <input type="text" id="searchInput" class="filter-input" placeholder="اسم المنتج، الكود، أو الفئة...">
    </div>
    <div class="filter-group">
      <label>الفئة</label>
      <select id="categoryFilter" class="filter-select">
        <option value="">جميع الفئات</option>
        <option value="فحم">فحم</option>
        <option value="حطب">حطب</option>
        <option value="شاي">شاي</option>
        <option value="إكسسوارات">إكسسوارات</option>
      </select>
    </div>
    <div class="filter-group">
      <label>حالة المخزون</label>
      <select id="statusFilter" class="filter-select">
        <option value="">جميع الحالات</option>
        <option value="active">نشط</option>
        <option value="low">منخفض</option>
        <option value="critical">حرج</option>
        <option value="damaged">تالف</option>
      </select>
    </div>
    <div class="filter-group">
      <label>المستودع</label>
      <select id="warehouseFilter" class="filter-select">
        <option value="">جميع المستودعات</option>
        <option value="الرياض">الرياض (الدفاع)</option>
        <option value="القصيم">القصيم</option>
        <option value="الدمام">الدمام</option>
        <option value="جدة">جدة</option>
        <option value="خميس">خميس مشيط</option>
      </select>
    </div>
  </div>

  <!-- Stats Overview -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" style="color: var(--accent);" id="totalProducts">15</div>
      <div class="stat-label">إجمالي المنتجات</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color: var(--accent3);" id="activeProducts">11</div>
      <div class="stat-label">منتجات نشطة</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color: var(--yellow);" id="lowProducts">2</div>
      <div class="stat-label">مخزون منخفض</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color: var(--red);" id="criticalProducts">2</div>
      <div class="stat-label">مخزون حرج/تالف</div>
    </div>
  </div>

  <!-- Products Grid -->
  <div id="productsGrid" class="products-grid"></div>

  <!-- Pagination -->
  <div class="pagination">
    <button id="prevBtn" onclick="changePage(-1)">السابق</button>
    <span id="pageInfo">صفحة 1 من 2</span>
    <button id="nextBtn" onclick="changePage(1)">التالي</button>
  </div>

  <!-- Charts Section -->
  <div class="charts-section">
    <div class="chart-card">
      <div class="chart-title">توزيع المنتجات حسب الفئة</div>
      <canvas id="categoryChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">حالة المخزون</div>
      <canvas id="statusChart"></canvas>
    </div>
  </div>
</div>

      "خميس": 0
    }
  }
];

// متغيرات التحكم
let currentPage = 1;
const itemsPerPage = 9;
let filteredProducts = [...products];

// دوال التصفية والبحث
function getStatusInfo(status, stock) {
  switch(status) {
    case 'active': return { text: 'نشط', class: 'status-active' };
    case 'low': return { text: 'منخفض', class: 'status-low' }; 
    case 'critical': return { text: 'حرج', class: 'status-critical' };
    case 'damaged': return { text: 'تالف', class: 'status-damaged' };
    default: return { text: 'نشط', class: 'status-active' };
  }
}

function filterProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const category = document.getElementById('categoryFilter').value;
  const status = document.getElementById('statusFilter').value;
  const warehouse = document.getElementById('warehouseFilter').value;

  filteredProducts = products.filter(product => {
    const matchSearch = !search || 
      product.name.toLowerCase().includes(search) ||
      product.code.toLowerCase().includes(search) ||
      product.category.toLowerCase().includes(search);
    
    const matchCategory = !category || product.category === category;
    const matchStatus = !status || product.status === status;
    const matchWarehouse = !warehouse || Object.keys(product.warehouses).some(w => w.includes(warehouse));

    return matchSearch && matchCategory && matchStatus && matchWarehouse;
  });

  currentPage = 1;
  renderProducts();
  updateStats();
}

function renderProducts() {
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageProducts = filteredProducts.slice(start, end);

  const grid = document.getElementById('productsGrid');
  
  if (pageProducts.length === 0) {
    grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-muted);">لم يتم العثور على منتجات مطابقة</div>';
    return;
  }

  grid.innerHTML = pageProducts.map(product => {
    const statusInfo = getStatusInfo(product.status, product.totalStock);
    const warehouseList = Object.entries(product.warehouses)
      .filter(([name, stock]) => stock > 0)
      .map(([name, stock]) => `
        <div class="warehouse-item">
          <span class="warehouse-name">${name}</span>
          <span class="warehouse-stock">${stock.toLocaleString('ar-SA')}</span>
        </div>
      `).join('');

    return `
      <div class="product-card">
        <div class="product-header">
          <div class="product-code">${product.code}</div>
          <div class="status-badge ${statusInfo.class}">${statusInfo.text}</div>
        </div>
        <div class="product-name">${product.name}</div>
        <div class="product-category">فئة: ${product.category}</div>
        
        <div class="stock-info">
          <div class="stock-item">
            <div class="stock-value" style="color: var(--accent);">${product.totalStock.toLocaleString('ar-SA')}</div>
            <div class="stock-label">إجمالي المخزون</div>
          </div>
          <div class="stock-item">
            <div class="stock-value" style="color: var(--accent3);">${Object.keys(product.warehouses).filter(w => product.warehouses[w] > 0).length}</div>
            <div class="stock-label">المستودعات النشطة</div>
          </div>
        </div>

        <div class="warehouse-list">
          <div style="color: var(--text-muted); font-size: 12px; margin-bottom: 8px;">توزيع المستودعات:</div>
          ${warehouseList}
        </div>
      </div>
    `;
  }).join('');

  // تحديث معلومات الصفحات
  const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
  document.getElementById('pageInfo').textContent = `صفحة ${currentPage} من ${totalPages}`;
  document.getElementById('prevBtn').disabled = currentPage === 1;
  document.getElementById('nextBtn').disabled = currentPage === totalPages;
  document.getElementById('resultsCount').textContent = `عرض ${filteredProducts.length} منتج`;
}

function changePage(direction) {
  const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
  const newPage = currentPage + direction;
  
  if (newPage >= 1 && newPage <= totalPages) {
    currentPage = newPage;
    renderProducts();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function updateStats() {
  const activeCount = filteredProducts.filter(p => p.status === 'active').length;
  const lowCount = filteredProducts.filter(p => p.status === 'low').length;
  const criticalCount = filteredProducts.filter(p => p.status === 'critical' || p.status === 'damaged').length;

  document.getElementById('totalProducts').textContent = filteredProducts.length;
  document.getElementById('activeProducts').textContent = activeCount;
  document.getElementById('lowProducts').textContent = lowCount;
  document.getElementById('criticalProducts').textContent = criticalCount;
}

function initCharts() {
  // مخطط الفئات
  const categoryData = products.reduce((acc, product) => {
    acc[product.category] = (acc[product.category] || 0) + 1;
    return acc;
  }, {});

  const catCtx = document.getElementById('categoryChart').getContext('2d');
  new Chart(catCtx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(categoryData),
      datasets: [{
        data: Object.values(categoryData),
        backgroundColor: ['#00d4ff', '#00ff9d', '#ff6b35', '#ffd700', '#a78bfa'],
        borderColor: '#111827',
        borderWidth: 2,
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#6b7fa3', font: { family: 'Tajawal', size: 11 } }
        }
      }
    }
  });

  // مخطط الحالة
  const statusData = products.reduce((acc, product) => {
    const statusText = getStatusInfo(product.status).text;
    acc[statusText] = (acc[statusText] || 0) + 1;
    return acc;
  }, {});

  const statCtx = document.getElementById('statusChart').getContext('2d');
  new Chart(statCtx, {
    type: 'bar',
    data: {
      labels: Object.keys(statusData),
      datasets: [{
        data: Object.values(statusData),
        backgroundColor: ['#00ff9d', '#ffd700', '#ff6b35', '#ff4757'],
        borderColor: '#111827',
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          grid: { color: 'rgba(30,45,69,0.5)' },
          ticks: { color: '#6b7fa3', font: { family: 'Tajawal' } }
        },
        x: {
          grid: { color: 'rgba(30,45,69,0.3)' },
          ticks: { color: '#6b7fa3', font: { family: 'Tajawal' } }
        }
      }
    }
  });
}

// إعداد الأحداث
document.getElementById('searchInput').addEventListener('input', filterProducts);
document.getElementById('categoryFilter').addEventListener('change', filterProducts);
document.getElementById('statusFilter').addEventListener('change', filterProducts);
document.getElementById('warehouseFilter').addEventListener('change', filterProducts);

// التشغيل الأولي
document.addEventListener('DOMContentLoaded', function() {
  renderProducts();
  updateStats(); 
  initCharts();
});
</script>

</html>
