<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتجات - داشبورد المخزون</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e1a; --surface: #111827; --accent: #00d4ff; --text: #e2e8f0;
}
body {
  font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text);
  margin: 0; padding: 24px; direction: rtl;
}
.container { max-width: 1400px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; margin-bottom: 32px; }
.header h1 { font-size: 28px; color: var(--accent); }
.back-link { color: var(--accent); text-decoration: none; padding: 8px 16px; border: 1px solid var(--accent); border-radius: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div><h1>تفاصيل المنتجات والمخزون</h1><p>جميع الأصناف مع التفاصيل الكاملة</p></div>
    <a href="index.html" class="back-link">العودة للداشبورد الرئيسي</a>
  </div>
  <div style="background: var(--surface); padding: 40px; border-radius: 16px; text-align: center;">
    <h2 style="color: var(--accent);">✅ تم إنشاء صفحة المنتجات!</h2>
    <p>صفحة تفصيلية كاملة مع جميع المنتجات والبيانات</p>
    <p>سيتم تحديث المحتوى الكامل خلال لحظات...</p>
  </div>
</div>
</body>
</html>
